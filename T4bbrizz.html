<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breezy</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

/* background image */
background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1508610048659-a06c4c1f3c34");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
text-align:center;
}
/* HEADER */

header{
padding:60px 20px;
}

h1{
font-size:70px;
letter-spacing:6px;
text-shadow:0 0 10px #00eaff,0 0 25px #00eaff;
}

.tagline{
opacity:.7;
margin-top:10px;
}

/* CARD */

.card{
max-width:800px;
margin:30px auto;
padding:30px;
background:rgba(255,255,255,0.05);
border-radius:20px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 20px rgba(0,234,255,0.25);
backdrop-filter:blur(10px);
}

/* SONG LIST */

.song{
padding:12px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
transition:.25s;
border:1px solid rgba(255,255,255,0.1);
}

.song:hover{
background:#00eaff;
color:black;
}

/* PLAYER */

audio{
width:100%;
margin-top:20px;
}

/* SOCIALS */

.socials a{
display:inline-block;
margin:12px;
padding:12px 24px;
border-radius:30px;
border:1px solid #00eaff;
color:white;
text-decoration:none;
transition:.25s;
}

.socials a:hover{
background:#00eaff;
color:black;
box-shadow:0 0 15px #00eaff;
}

/* FOOTER */

footer{
margin:50px 0;
opacity:.5;
}

</style>

</head>

<body>
<header>
<h1 class="chrome-logo">BREEZY</h1>
<p class="tagline">Just an Artist Tryna Make it Out</p>
</header>

<style>
.chrome-logo{
font-size:80px;
font-weight:900;
letter-spacing:8px;

/* chrome gradient */
background: linear-gradient(
90deg,
#ffffff,
#cfcfcf,
#8a8a8a,
#ffffff,
#bfbfbf,
#ffffff
);

background-size:400%;
-webkit-background-clip:text;
color:transparent;

/* glow */
text-shadow:
0 0 5px #ffffff,
0 0 15px #00eaff,
0 0 30px #00eaff;

/* animation */
animation: chromeMove 6s linear infinite;
}

@keyframes chromeMove{
0%{
background-position:0%;
}
100%{
background-position:400%;
}
}
</style>


<div class="card">

<h2>🎧 Songs</h2>

<div class="song" onclick="playSong('https://drive.google.com/uc?export=download&id=1AWAU8t1-7hwvPBUwQCbadIRg9hb_DvsD')">
Wishing Well
</div>

<div class="song" onclick="playSong('https://drive.google.com/uc?export=download&id=1wGeRGo8tzQiAJZSy0uc06sjkPNha6GBR')">
Hold On
</div>

<div class="song" onclick="playSong('https://drive.google.com/uc?export=download&id=1Z6XfZ1aCDS1nq-of5rCLE65hTxQx7TUR')">
Lovestruck
</div>

<audio id="player" controls></audio>

</div>

<div class="card">

<h2>🌐 Socials</h2>

<div class="socials">
<a href="https://instagram.com/T4bbrizz" target="_blank">Instagram</a>
<a href="https://snapchat.com/add/ttenarvitz" target="_blank">Snapchat</a>
</div>

</div>

<footer>
© Breezy
</footer>

<script>

function playSong(link){
let player = document.getElementById("player");
player.src = link;
player.play();
}

</script>

</body>
</html>
